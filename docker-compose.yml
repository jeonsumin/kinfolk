services:
  frontend:
    build:
      context: ./workspace/frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: kinfolk-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET before starting Docker Compose}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_API_URL: ${AUTH_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./workspace/backend-jwt
    container_name: kinfolk-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:log4jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-backend_jwt}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      DB_USERNAME: ${MYSQL_USER:-backend}
      DB_PASSWORD: ${MYSQL_PASSWORD:-backend_password}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET before starting Docker Compose}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: kinfolk-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-backend_jwt}
      MYSQL_USER: ${MYSQL_USER:-backend}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-backend_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./workspace/backend-jwt/src/main/resources/core_schema_mysql.sql:/docker-entrypoint-initdb.d/core_schema_mysql.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql-data:
