services:
  frontend:
    build:
      context: ./workspace/frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: kinfolk-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET before starting Docker Compose}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_API_URL: ${AUTH_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./workspace/backend-jwt
    container_name: kinfolk-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped
