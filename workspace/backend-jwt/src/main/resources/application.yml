debug: true

server:
  port: 8080
  servlet:
    session:
      timeout: 240m
      cookie:
        name: _swc
        max-age: 24H
spring:
  datasource:
    driver-class-name: ${DB_DRIVER_CLASS:net.sf.log4jdbc.sql.jdbcapi.DriverSpy}
    url: ${DB_URL:jdbc:log4jdbc:mysql://mysql:3306/backend_jwt?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:backend}
    password: ${DB_PASSWORD:backend_password}
mybatis:
  mapper-locations:
    - classpath:/mappers/**/*Mapper.xml
  configuration:
    cash-enabled: true
    map-underscore-to-camel-case: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    type-handlers-package: com.terry.backend.thirdparty.handlers

logging:
  level:
    org.springframework: info

mail:
  fromMail: abc@gmail.com
  password: 123
  fromName: test

jwt:
  secret: ${JWT_SECRET}
  token-validity: 1800
  refresh-token-validity: 604800

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
